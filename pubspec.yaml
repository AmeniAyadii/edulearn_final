dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  hive_generator: ^2.0.0

  flutter_launcher_icons: ^0.13.1   # ⭐ AJOUTEZ CETTE LIGNE

 

# ✅ RÉSOLUTION DU CONFLIT google_mlkit_commons
dependency_overrides:
  google_mlkit_commons: ^0.11.0

flutter:
  uses-material-design: true

  generate: true  # ← AJOUTER CETTE LIGNE

  assets:
    - assets/sounds/click.mp3
    - assets/sounds/success.mp3
    - assets/sounds/error.mp3
    - assets/sounds/notification.mp3
    - assets/sounds/level_up.mp3
    - assets/sounds/welcome.mp3
    - assets/sounds/background.mp3
    - assets/music/background.mp3
    - assets/sounds/scan.mp3
    - assets/sounds/info.mp3
    - assets/animations/camera.json
    - assets/animations/scanning.json
    - assets/animations/success_check.json
    - assets/translations/
    - assets/.env  # Ajoutez cette ligne

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#4A90E2"
  adaptive_icon_foreground: "assets/icon/icon.png"

  